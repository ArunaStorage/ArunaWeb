<h1 mat-dialog-title color="primary">
    <button mat-mini-fab mat-dialog-close #tooltip="matTooltip" matTooltip="Close" matTooltipPosition="below"
        color="primary">
        <mat-icon>close</mat-icon>
    </button>
    Create Revision
</h1>

<div mat-dialog-content>
    <mat-tab-group>
        <mat-tab label="Specs">
            <mat-card>
                <mat-card-content>
                    Description text ...
                    <br>
                    <mat-form-field appearance="fill" class="example-form">
                        <mat-label>Name</mat-label>
                        <input type="text" matInput [(ngModel)]="new_revision.name" placeholder="Example1">
                    </mat-form-field>
                    <br>
                    <mat-form-field appearance="fill" class="example-form">
                        <mat-label>Description</mat-label>
                        <input type="text" matInput [(ngModel)]="new_revision.description" placeholder="Description1">
                    </mat-form-field>
                </mat-card-content>
            </mat-card>
        </mat-tab>

        <mat-tab label="Objects">
            <button mat-raised-button color="primary" (click)="createObject()">
                Add Object
            </button>
            <table mat-table [dataSource]="objects_table" class="table">
                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef> Filename </th>
                    <td mat-cell *matCellDef="let element"> </td>
                </ng-container>
                <ng-container matColumnDef="description">
                    <th mat-header-cell *matHeaderCellDef> Filetype </th>
                    <td mat-cell *matCellDef="let element"> </td>
                </ng-container>
                <ng-container matColumnDef="created">
                    <th mat-header-cell *matHeaderCellDef> Created </th>
                    <td mat-cell *matCellDef="let element"> </td>
                </ng-container>
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef>Actions</th>
                    <td mat-cell *matCellDef="let element">
                        <button mat-icon-button #tooltip="matTooltip" matTooltip="Edit Object"
                            matTooltipPosition="above" color="primary">
                            <mat-icon>create</mat-icon>
                        </button>
                        <button mat-icon-button #tooltip="matTooltip" matTooltip="Delete Object"
                            matTooltipPosition="above" color="warn" matTooltipClass="warning-snackbar">
                            <mat-icon>delete_forever</mat-icon>
                        </button>
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </mat-tab>

        <mat-tab label="Metadata">
        </mat-tab>

    </mat-tab-group>
    <button mat-raised-button color="primary" mat-dialog-close #tooltip="matTooltip"
        matTooltip="Update Object Group by creating a new revision" matTooltipPosition="above" (click)="isValid()">
        Update
    </button>
</div>

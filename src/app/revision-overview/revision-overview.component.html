<mat-toolbar color="primary">
    <button mat-icon-button color="secondary" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
    </button>
    <span>BioData DB - Revision Overview - Object Group: XXXXXX </span>
    <span class="example-spacer"></span>
    <button mat-icon-button #tooltip="matTooltip" matTooltip="Endpoint URLs" matTooltipPosition="below"
        color="secondary" (click)="openEndpoints()">
        <mat-icon>build</mat-icon>
    </button>
    <button mat-raised-button color="secondary" (click)="openProfile()">
        <mat-icon>person</mat-icon>
        {{authService.user_data.preferred_username}}
    </button>
</mat-toolbar>

<mat-card class="mat-elevation-z8">

    <mat-card-header>
        <mat-card-title>
            Revision Overview
        </mat-card-title>
    </mat-card-header>

    <mat-card-content>   
        <mat-list>
            <mat-list-item style="height: 40px;">
                <mat-icon>bar_chart</mat-icon>
                Number of Revisions: {{apiService.objectGroupRevisions.length}}
            </mat-list-item>

            <mat-list-item style="height: 40px;">
                <mat-label>
                    The table below contains the Revisions for the Object Group XXXXXXX.
                </mat-label>
            </mat-list-item>
            
        </mat-list>
    </mat-card-content>

    <mat-card-actions>
        <button mat-mini-fab #tooltip="matTooltip" matTooltip="Generate new Revision" matTooltipPosition="right"
            color="primary" (click)="newRevision()">
            <mat-icon>add</mat-icon>
        </button>
    </mat-card-actions>

</mat-card>


<table mat-table [dataSource]="table_data" matSort class="mat-elevation-z8">

    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>
    <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Description </th>
        <td mat-cell *matCellDef="let element"> {{element.description}} </td>
    </ng-container>


    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
